version: '3.8'

services:
  frontend:
    image: decnj/nginx-task:1.0
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - task-net

  backend:
    image: decnj/nodejs-task:2.0
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - task-net

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      task-net:
        aliases:
          - mongo

  consul:
    image: consul:1.15
    ports:
      - "8500:8500"   # Consul UI
      - "8600:8600/udp"
    command: agent -dev -client=0.0.0.0 -config-dir=/consul/config
    volumes:
      - ./consul-config:/consul/config   # mount your service definitions here
    networks:
      - task-net

volumes:
  mongo_data:

networks:
  task-net:
    driver: bridge

